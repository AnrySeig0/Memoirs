services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: memoir-postgres
    environment:
      POSTGRES_USER: memoir
      POSTGRES_PASSWORD: memoir
      POSTGRES_DB: memoir
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: memoir-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: memoir
      MINIO_ROOT_PASSWORD: memoir-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: memoir-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  minio_data:
  redis_data:
